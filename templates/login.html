{% extends "layout.html" %}

{% block content %}
<!-- Is card ke andar tera login form hai jo layout.html ke block mein fit hoga -->
<div class="card">
    <h2 style="color: #F5A623;">Welcome Back</h2>
    <p style="color: #8892A4; font-size: 14px; margin-bottom: 25px;">Login to manage your solar assets</p>
    
    <form method="POST">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn">Sign In</button>
    </form>
    
    <p style="font-size: 14px; margin-top: 25px; color: #F0F4FF;">
        New user? <a href="/signup" style="color: #F5A623; text-decoration: none; font-weight: bold;">Create Account</a>
    </p>
    <a href="/" style="display:block; margin-top:15px; color:#8892A4; text-decoration:none; font-size:12px;">← Back to Home</a>
</div>
{% endblock %}
